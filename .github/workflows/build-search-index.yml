name: Build Search Index

on:
  schedule:
    - cron: "0 5 * * *"   # dagligt kl. 05:00 UTC
  workflow_dispatch:        # kan også køres manuelt fra GitHub
    inputs:
      rebuild:
        description: "Genopbyg hele indekset fra bunden (slet eksisterende)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout vidensassistent
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic requests beautifulsoup4 yt-dlp

      - name: Build search index
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REBUILD: ${{ github.event.inputs.rebuild || 'false' }}
        run: python build_search_index.py

      - name: Commit and push updated index
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add search-index.json
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "chore: update search index [skip ci]" &&
            git pull --rebase origin main &&
            git push
          )
