<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNNK Vidensassistent</title>
  <style>
    :root {
      --blue:   #3B8EC8;
      --dblue:  #2471A3;
      --green:  #27AE60;
      --text:   #2C3E50;
      --muted:  #7F8C8D;
      --border: #D5D8DC;
      --bg:     #F2F3F4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

    /* ── Navbar ───────────────────────────────────────────────── */
    nav {
      background: #fff;
      border-bottom: 3px solid var(--blue);
      padding: 0 24px;
      display: flex;
      align-items: center;
      height: 52px;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: .95rem; color: var(--text); }
    .nav-status { display: flex; align-items: center; gap: 6px; margin-left: 16px; font-size: .8rem; color: var(--muted); }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #F39C12; flex-shrink: 0; }
    .dot.ok    { background: var(--green); }
    .dot.error { background: #E74C3C; }
    .nav-tabs { margin-left: auto; display: flex; gap: 0; }
    .nav-tab {
      padding: 0 20px; height: 52px; border: none; background: none; cursor: pointer;
      font-size: .85rem; font-weight: 700; letter-spacing: .5px; color: var(--muted);
      text-transform: uppercase; border-bottom: 3px solid transparent; margin-bottom: -3px;
    }
    .nav-tab.active { color: var(--blue); border-bottom-color: var(--blue); }

    /* ── Layout ───────────────────────────────────────────────── */
    .page { display: none; max-width: 900px; margin: 0 auto; padding: 32px 24px; }
    .page.active { display: block; }

    /* ── Section heading ──────────────────────────────────────── */
    .section-label {
      font-size: .72rem; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--blue); margin-bottom: 12px;
    }

    /* ── Search ───────────────────────────────────────────────── */
    .search-box {
      display: flex; border: 1.5px solid var(--border); border-radius: 4px;
      overflow: hidden; background: #fff; margin-bottom: 14px;
    }
    .search-box input {
      flex: 1; border: none; outline: none; padding: 12px 16px;
      font-size: .95rem; background: transparent; color: var(--text);
    }
    .search-box input::placeholder { color: #aaa; }
    .search-box button {
      background: var(--blue); color: #fff; border: none; padding: 12px 28px;
      font-size: .85rem; font-weight: 700; letter-spacing: .5px; cursor: pointer;
      text-transform: uppercase;
    }
    .search-box button:disabled { opacity: .6; cursor: default; }

    /* ── Filters ──────────────────────────────────────────────── */
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .filter-btn {
      padding: 5px 14px; border: 1.5px solid var(--border); border-radius: 4px;
      background: #fff; font-size: .8rem; cursor: pointer; color: var(--muted);
    }
    .filter-btn.active { border-color: var(--blue); color: var(--blue); font-weight: 600; }

    /* ── Loading bar ──────────────────────────────────────────── */
    #loadingBar { height: 2px; background: var(--blue); width: 0; transition: width .3s; border-radius: 1px; margin-bottom: 4px; }

    /* ── Results header ───────────────────────────────────────── */
    #resultsHeader { font-size: .8rem; color: var(--muted); margin-bottom: 14px; }

    /* ── Empty state ──────────────────────────────────────────── */
    #emptyState { display: none; text-align: center; padding: 64px 0; color: var(--muted); }
    #emptyState svg { opacity: .25; margin-bottom: 16px; }
    #emptyState p { font-size: .95rem; }

    /* ── Result card ──────────────────────────────────────────── */
    .result-card {
      background: #fff; border: 1px solid var(--border); border-radius: 4px;
      padding: 16px 20px; margin-bottom: 10px;
      transition: border-color .15s, box-shadow .15s;
    }
    .result-card:hover { border-color: var(--blue); box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .card-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
    .card-cat {
      font-size: .68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: var(--blue);
    }
    .card-date { font-size: .75rem; color: var(--muted); }
    .card-title { font-size: .97rem; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.35; }
    .card-summary { font-size: .85rem; color: #555; line-height: 1.55; margin-bottom: 10px; }
    .card-keywords { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
    .kw {
      font-size: .71rem; padding: 2px 9px; border-radius: 3px;
      background: #EBF5FB; color: var(--dblue); border: 1px solid #AED6F1;
    }
    .kw.match { background: #EAFAF1; color: #1E8449; border-color: #A9DFBF; }
    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-yt {
      font-size: .8rem; padding: 5px 13px; border-radius: 3px; font-weight: 500;
      text-decoration: none; border: 1.5px solid #E74C3C;
      background: #FDEDEC; color: #C0392B; cursor: pointer;
    }
    .btn-dnnk {
      font-size: .8rem; padding: 5px 13px; border-radius: 3px; font-weight: 500;
      text-decoration: none; border: 1.5px solid var(--blue);
      background: #EBF5FB; color: var(--dblue); cursor: pointer;
    }
    .btn-chat {
      font-size: .8rem; padding: 5px 13px; border-radius: 3px; font-weight: 500;
      border: 1.5px solid var(--border); background: #fff; color: var(--text); cursor: pointer;
    }
    .btn-chat:hover { background: var(--bg); }

    /* ── Chat ─────────────────────────────────────────────────── */
    .chat-key-row {
      background: #fff; border: 1px solid var(--border); border-radius: 4px;
      padding: 14px 16px; margin-bottom: 16px;
    }
    .chat-key-row label { font-size: .8rem; font-weight: 600; display: block; margin-bottom: 6px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .chat-key-row .row { display: flex; gap: 8px; }
    .chat-key-row input {
      flex: 1; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 4px;
      font-size: .9rem; outline: none;
    }
    .chat-key-row input:focus { border-color: var(--blue); }
    .btn-secondary {
      padding: 8px 16px; border: 1.5px solid var(--border); border-radius: 4px;
      background: #fff; font-size: .82rem; cursor: pointer; font-weight: 600; color: var(--muted);
    }
    .btn-secondary:hover { background: var(--bg); }

    .context-bar {
      background: #EBF5FB; border: 1px solid #AED6F1; border-radius: 4px;
      padding: 9px 14px; margin-bottom: 12px; font-size: .83rem; color: var(--dblue);
      display: none; align-items: center; justify-content: space-between;
    }

    #chatBox {
      background: #fff; border: 1px solid var(--border); border-radius: 4px;
      height: 380px; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px;
    }
    .msg { max-width: 82%; padding: 10px 14px; border-radius: 4px; font-size: .88rem; line-height: 1.5; }
    .msg.user { background: var(--blue); color: #fff; align-self: flex-end; }
    .msg.bot  { background: var(--bg); color: var(--text); align-self: flex-start; }
    .msg.bot h1,.msg.bot h2,.msg.bot h3 { font-size: 1em; margin: .4em 0 .2em; }
    .msg.bot ul,.msg.bot ol { padding-left: 1.3em; margin: .3em 0; }
    .msg.bot p { margin: .25em 0; }
    .msg.bot strong { font-weight: 700; }
    .msg.bot a { color: var(--blue); }

    .chat-input-row { display: flex; gap: 8px; }
    .chat-input-row textarea {
      flex: 1; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 4px;
      font-size: .9rem; resize: none; height: 58px; font-family: inherit; outline: none;
    }
    .chat-input-row textarea:focus { border-color: var(--blue); }
    .btn-send {
      background: var(--blue); color: #fff; border: none; border-radius: 4px;
      padding: 0 22px; font-size: .85rem; font-weight: 700; cursor: pointer;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .btn-send:disabled { opacity: .6; cursor: default; }

    /* ── Spinner ──────────────────────────────────────────────── */
    .spin {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
      border-radius: 50%; animation: s .7s linear infinite;
    }
    @keyframes s { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────────── -->
<nav>
  <div class="nav-brand">
    <!-- DNNK cube logo -->
    <svg width="28" height="28" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="50,5 95,28 95,72 50,95 5,72 5,28" fill="#3B8EC8" opacity=".9"/>
      <polygon points="50,5 95,28 50,50" fill="#2471A3"/>
      <polygon points="5,28 50,50 50,95 5,72" fill="#1A5276"/>
      <polygon points="95,28 95,72 50,95 50,50" fill="#1E8449" opacity=".85"/>
    </svg>
    DNNK Vidensassistent
  </div>
  <div class="nav-status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Indlæser…</span>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-search" onclick="switchTab('search')">Søg</button>
    <button class="nav-tab"        id="tab-chat"   onclick="switchTab('chat')">Chat</button>
  </div>
</nav>

<!-- ── SØGESIDE ─────────────────────────────────────────────────── -->
<div class="page active" id="page-search">
  <div class="section-label">Søg i DNNK's webinar-vidensbank</div>

  <div class="search-box">
    <input id="searchInput" type="text"
           placeholder="fx: naturbaseret kystbeskyttelse, LAR-anlæg, stormflod…"
           onkeydown="if(event.key==='Enter') doSearch()">
    <button id="searchBtn" onclick="doSearch()">Søg</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-cat="alle"               onclick="setFilter(this)">Alle kategorier</button>
    <button class="filter-btn"        data-cat="Tech Talk"          onclick="setFilter(this)">Tech Talks</button>
    <button class="filter-btn"        data-cat="Godmorgen med DNNK" onclick="setFilter(this)">Godmorgen med DNNK</button>
    <button class="filter-btn"        data-cat="Jura"               onclick="setFilter(this)">Jura</button>
    <button class="filter-btn"        data-cat="Masterclass"        onclick="setFilter(this)">Masterclass</button>
  </div>

  <div id="loadingBar"></div>
  <div id="resultsHeader"></div>

  <div id="emptyState" style="display:block">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#3B8EC8" stroke-width="1.5">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <p id="emptyMsg">Søg på et emne eller stil et spørgsmål</p>
  </div>

  <div id="results"></div>
</div>

<!-- ── CHATSIDE ─────────────────────────────────────────────────── -->
<div class="page" id="page-chat">
  <div class="section-label">Chat med vidensbanken</div>

  <div class="chat-key-row">
    <label>Anthropic API-nøgle</label>
    <div class="row">
      <input type="password" id="apiKeyInput" placeholder="sk-ant-…" oninput="saveKey()">
      <button class="btn-secondary" onclick="clearChat()">Ny samtale</button>
    </div>
  </div>

  <div class="context-bar" id="contextBar">
    <span id="contextLabel"></span>
    <button class="btn-secondary" onclick="clearContext()" style="padding:4px 10px;font-size:.78rem">Ryd</button>
  </div>

  <div id="chatBox">
    <div class="msg bot">Hej! Jeg kan besvare spørgsmål baseret på DNNK's webinar-transskriptioner. Hvad vil du gerne vide om klimatilpasning?</div>
  </div>

  <div class="chat-input-row">
    <textarea id="chatInput" placeholder="Stil et spørgsmål…"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}"></textarea>
    <button class="btn-send" id="chatBtn" onclick="sendChat()">Send</button>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let searchIndex   = [];
let currentFilter = 'alle';
let chatHistory   = [];
let chatContext   = null;

// ── Boot ───────────────────────────────────────────────────────────────────
loadKey();
loadIndex();

async function loadIndex() {
  const dot  = document.getElementById('statusDot');
  const txt  = document.getElementById('statusText');
  try {
    const r = await fetch('search-index.json?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    searchIndex = await r.json();
    dot.className = 'dot ok';
    txt.textContent = searchIndex.length + ' webinarer indekseret';
  } catch (e) {
    dot.className = 'dot error';
    txt.textContent = 'Fejl ved indlæsning';
    console.error(e);
  }
}

// ── Tabs ───────────────────────────────────────────────────────────────────
function switchTab(name) {
  ['search','chat'].forEach(n => {
    document.getElementById('page-' + n).classList.toggle('active', n === name);
    document.getElementById('tab-'  + n).classList.toggle('active', n === name);
  });
}

// ── Filters ────────────────────────────────────────────────────────────────
function setFilter(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.cat;
}

// ── Search ─────────────────────────────────────────────────────────────────
function words(text) {
  return text.toLowerCase().split(/\s+/).filter(w => w.length > 1);
}

function score(entry, ws) {
  const t = (entry.title       || '').toLowerCase();
  const s = (entry.summary     || '').toLowerCase();
  const d = (entry.description || '').toLowerCase();
  const c = (entry.category    || '').toLowerCase();
  const kw = (entry.keywords   || []).map(k => k.toLowerCase());

  let pts = 0;
  const hits = new Set();

  for (const w of ws) {
    if (t.includes(w))  pts += 10;
    if (c.includes(w))  pts += 4;
    for (const k of kw) {
      if (k.includes(w) || w.includes(k)) { pts += 7; hits.add(k); }
    }
    pts += (s.match(new RegExp(w, 'g')) || []).length * 3;
    if (d.includes(w))  pts += 2;
  }
  return { pts, hits: [...hits] };
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;

  if (!searchIndex.length) {
    showEmpty('Vidensbanken indlæses stadig – prøv igen om et øjeblik.');
    return;
  }

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>';

  const bar = document.getElementById('loadingBar');
  bar.style.width = '65%';

  document.getElementById('results').innerHTML = '';
  document.getElementById('resultsHeader').textContent = '';
  document.getElementById('emptyState').style.display = 'none';

  const ws = words(q);
  const pool = currentFilter === 'alle'
    ? searchIndex
    : searchIndex.filter(e => (e.category || '') === currentFilter);

  const ranked = pool
    .map(e => { const { pts, hits } = score(e, ws); return { e, pts, hits }; })
    .filter(x => x.pts > 0)
    .sort((a, b) => b.pts - a.pts)
    .slice(0, 12);

  bar.style.width = '100%';
  setTimeout(() => bar.style.width = '0', 400);
  btn.disabled = false;
  btn.textContent = 'Søg';

  if (!ranked.length) {
    showEmpty('Ingen resultater for "' + q + '" – prøv andre søgeord.');
    return;
  }

  document.getElementById('resultsHeader').textContent =
    ranked.length + (ranked.length === 12 ? '+' : '') + ' resultater for "' + q + '"';

  const container = document.getElementById('results');
  ranked.forEach(({ e, hits }) => container.appendChild(buildCard(e, hits)));
}

function showEmpty(msg) {
  const el = document.getElementById('emptyState');
  el.style.display = 'block';
  document.getElementById('emptyMsg').textContent = msg;
}

// ── Card ───────────────────────────────────────────────────────────────────
function buildCard(e, matchedKws) {
  const card = document.createElement('div');
  card.className = 'result-card';

  // meta
  const meta = el('div', 'card-meta');
  meta.appendChild(txt('span', 'card-cat', e.category || 'Øvrige'));
  if (e.date) meta.appendChild(txt('span', 'card-date', e.date));
  card.appendChild(meta);

  // title
  card.appendChild(txt('div', 'card-title', e.title || e.filename));

  // summary
  const body = e.summary || e.description || '';
  if (body) card.appendChild(txt('div', 'card-summary', body));

  // keywords
  if (e.keywords && e.keywords.length) {
    const kws = el('div', 'card-keywords');
    const matched = new Set(matchedKws.map(k => k.toLowerCase()));
    e.keywords.forEach(k => {
      const span = document.createElement('span');
      span.className = 'kw' + (matched.has(k.toLowerCase()) ? ' match' : '');
      span.textContent = k;
      kws.appendChild(span);
    });
    card.appendChild(kws);
  }

  // actions
  const acts = el('div', 'card-actions');
  if (e.youtube_url) {
    const a = document.createElement('a');
    a.href = e.youtube_url; a.target = '_blank';
    a.className = 'btn-yt'; a.textContent = '▶ Se webinaret';
    acts.appendChild(a);
  }
  if (e.dnnk_url) {
    const a = document.createElement('a');
    a.href = e.dnnk_url; a.target = '_blank';
    a.className = 'btn-dnnk'; a.textContent = 'dnnk.dk';
    acts.appendChild(a);
  }
  const chatBtn = document.createElement('button');
  chatBtn.className = 'btn-chat';
  chatBtn.textContent = 'Spørg om dette webinar';
  chatBtn.onclick = () => openInChat(e);
  acts.appendChild(chatBtn);
  card.appendChild(acts);

  return card;
}

function el(tag, cls) {
  const d = document.createElement(tag);
  d.className = cls;
  return d;
}
function txt(tag, cls, text) {
  const d = el(tag, cls);
  d.textContent = text;
  return d;
}

// ── Chat ───────────────────────────────────────────────────────────────────
function saveKey() {
  localStorage.setItem('dnnk_key', document.getElementById('apiKeyInput').value.trim());
}
function loadKey() {
  document.getElementById('apiKeyInput').value = localStorage.getItem('dnnk_key') || '';
}

function clearChat() {
  chatHistory = []; chatContext = null;
  updateContextBar();
  document.getElementById('chatBox').innerHTML =
    '<div class="msg bot">Ny samtale startet. Hvad vil du gerne vide?</div>';
}

async function openInChat(entry) {
  switchTab('chat');
  chatContext = { title: entry.title, content: entry.summary || '' };
  updateContextBar();

  if (entry._content) {
    chatContext.content = entry._content;
    return;
  }
  if (!entry.path) return;

  try {
    const safePath = entry.path.split('/').map(encodeURIComponent).join('/');
    const url = `https://raw.githubusercontent.com/klimatilpasning/dnnk-transcriptor/main/${safePath}`;
    const r = await fetch(url);
    entry._content = await r.text();
    chatContext.content = entry._content;
  } catch { /* keep summary as fallback */ }
}

function clearContext() {
  chatContext = null;
  updateContextBar();
}
function updateContextBar() {
  const bar = document.getElementById('contextBar');
  bar.style.display = chatContext ? 'flex' : 'none';
  if (chatContext)
    document.getElementById('contextLabel').textContent = '📄 ' + chatContext.title;
}

function md(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, s => '<ul>'+s+'</ul>')
    .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank">$1</a>')
    .replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br>');
}

function appendMsg(role, text, isMarkdown) {
  const box = document.getElementById('chatBox');
  const d = document.createElement('div');
  d.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
  d.innerHTML = isMarkdown ? md(text) : text.replace(/</g,'&lt;');
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

async function sendChat() {
  const key = localStorage.getItem('dnnk_key') || '';
  if (!key) { alert('Indtast din Anthropic API-nøgle.'); return; }

  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  appendMsg('user', msg, false);
  chatHistory.push({ role: 'user', content: msg });

  const btn = document.getElementById('chatBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>';

  // Build system prompt
  let sys = `Du er vidensassistent for DNNK (Det Nationale Netværk for Klimatilpasning).
Besvar spørgsmål præcist på dansk baseret på webinar-transskriptioner.
Angiv altid hvilket webinar information stammer fra. Vær kortfattet og faglig.`;

  if (chatContext && chatContext.content) {
    sys += `\n\nPrimær kilde – ${chatContext.title}:\n${chatContext.content.slice(0, 8000)}`;
  } else {
    const ws = words(msg);
    const top = searchIndex
      .map(e => ({ e, pts: score(e, ws).pts }))
      .filter(x => x.pts > 0)
      .sort((a, b) => b.pts - a.pts)
      .slice(0, 5);
    if (top.length) {
      sys += '\n\nRelevante webinar-resuméer:\n';
      top.forEach(({ e }) => {
        sys += `\n## ${e.title}\n${e.summary || ''}\nNøgleord: ${(e.keywords||[]).join(', ')}\n`;
      });
    }
  }

  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1024,
        system: sys,
        messages: chatHistory,
      }),
    });
    const data = await r.json();
    if (data.error) throw new Error(data.error.message);
    const reply = data.content[0].text;
    chatHistory.push({ role: 'assistant', content: reply });
    appendMsg('assistant', reply, true);
  } catch (err) {
    appendMsg('assistant', '⚠️ Fejl: ' + err.message, false);
  }

  btn.disabled = false;
  btn.textContent = 'Send';
}
</script>
</body>
</html>
